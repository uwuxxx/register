<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aura</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      display: block !important;
      background: url("https://uwuxxx.github.io/image/news.png") no-repeat center center/cover;
      height: 100vh;
      color: white;
      overflow-x: hidden;
    }

    /* DARK OVERLAY (makes text readable) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      z-index: -1;
    }

    .home-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    .title {
      font-size: 3rem;
      text-shadow: 0 0 20px #4CAF50;
      animation: glow 2s infinite;
    }

    .intro {
      opacity: 0.85;
      margin: 20px 0 30px;
    }

    .home-btn {
      display: inline-block;
      padding: 12px 25px;
      margin: 10px;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
    }

    .home-btn:hover {
      transform: scale(1.1);
    }

    .home-btn.alt {
      background: linear-gradient(135deg, #2196F3, #1565C0);
    }

    .team {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .member {
      width: 160px;
      transition: 0.3s;
    }

    .member:hover {
      transform: translateY(-8px) scale(1.05);
    }

    .member img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #4CAF50;
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px #4CAF50; }
      50% { text-shadow: 0 0 30px #4CAF50; }
      100% { text-shadow: 0 0 10px #4CAF50; }
    }
  </style>
</head>

<body>

  <div class="home-container">

    <h1 class="title">Aura</h1>

    <p class="intro">
      Welcome to Project Aura play old Fortnite again with seasons like 12.41, 6.21,
      and exclusive content for supporters.
    </p>

    <div>
      <a href="register.html" class="home-btn">Register</a>
      <a href="accountExists.html" class="home-btn alt">Login</a>
    </div>

    <h2>Meet Our Team</h2>

    <div class="team">
      <div class="member">
        <img src="https://cdn.discordapp.com/avatars/1479616540423749823/790c0be3a79f2b9b95c363287dad16e5.png?size=1024">
        <p>Main Developer & Founder</p>
      </div>

      <div class="member">
        <img src="https://cdn.discordapp.com/avatars/921516952801923133/3578384ae5f3e78fb237ffdd2f4add60.png?size=1024">
        <p>Koopa - Main Moderator</p>
      </div>
    </div>

  </div>

</body>
</html>
