<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aura</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-theme">

  <div class="home-container">

    <h1 class="title glow">Aura</h1>

    <p class="intro">
      Welcome to Project Aura relive old Fortnite with seasons like 12.41, 6.21,
      and exclusive content for supporters!
    </p>

    <div class="buttons">
      <a href="register.html" class="home-btn">Register</a>
    </div>

    <h2 class="team-title">Meet Our Team</h2>

    <div class="team">

      <div class="member">
        <img src="https://cdn.discordapp.com/avatars/1479616540423749823/790c0be3a79f2b9b95c363287dad16e5.png?size=1024" alt="Founder">
        <p>Main Developer & Founder</p>
      </div>

      <div class="member">
        <img src="https://cdn.discordapp.com/avatars/921516952801923133/3578384ae5f3e78fb237ffdd2f4add60.png?size=1024" alt="Moderator">
        <p>Koopa - Main Moderator</p>
      </div>

    </div>

  </div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" onclick="toggleTheme()"></button>

  <script>
    function toggleTheme() {
      const body = document.body;
      body.classList.toggle("dark-theme");
      body.classList.toggle("light-theme");
    }
  </script>

</body>
</html>
